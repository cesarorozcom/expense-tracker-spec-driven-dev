[pytest]
# Django configuration
DJANGO_SETTINGS_MODULE = expense_tracker.settings

# Test discovery patterns
python_files = tests.py test_*.py *_tests.py
python_classes = Test*
python_functions = test_*

# Markers for test categorization
markers =
	django_db: mark test as requiring database access
	unit: mark test as a unit test
	integration: mark test as an integration test
	e2e: mark test as end-to-end test
	contract: mark test as verifying API contract
	slow: mark test as slow running

# Test output configuration
addopts =
	-v
	--strict-markers
	--tb=short
	--disable-warnings
	--cov=ledger
	--cov=expense_tracker
	--cov-report=term-missing
	--cov-report=html
	-p no:warnings

# Minimum Python version
minversion = 7.0

# Ignore deprecation warnings from dependencies
filterwarnings =
	ignore::DeprecationWarning
	ignore::PendingDeprecationWarning

# Test paths
testpaths = ledger/tests tests
